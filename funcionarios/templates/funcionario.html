<!-- templates/funcionario.html -->

{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Cadastrar Funcionário
    </title>

   <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html{
        width:100%;
        min-height:100%;
        overflow-x:hidden;
    }

    body{
        background:#020617;
        color:white;
        font-family:'Segoe UI', Arial, Helvetica, sans-serif;
        display:flex;
        min-height:100vh;
        width:100%;
        max-width:100%;
        overflow-x:hidden;
    }

    input,
    select,
    textarea,
    button,
    a{
        max-width:100%;
    }

    .sidebar{
        width:260px;
        min-width:260px;
        background:#020617;
        padding:30px;
        border-right:1px solid #1e293b;
        min-height:100vh;
        overflow-y:auto;
        flex-shrink:0;
    }

    .sidebar h1{
        color:#38bdf8;
        margin-bottom:50px;
        font-size:26px;
        line-height:1.2;
    }

    .sidebar a{
        display:block;
        color:#cbd5e1;
        text-decoration:none;
        margin-bottom:30px;
        font-size:16px;
        transition:0.3s;
        word-break:break-word;
    }

    .sidebar a:hover{
        color:#38bdf8;
    }

    .content{
        flex:1;
        padding:35px;
        width:100%;
        min-width:0;
        max-width:100%;
        overflow-x:hidden;
    }

    .topo h1{
        font-size:clamp(30px, 5vw, 48px);
        margin-bottom:10px;
        line-height:1.2;
    }

    .topo p{
        color:#94a3b8;
        margin-bottom:35px;
        font-size:clamp(15px, 2vw, 20px);
        line-height:1.5;
    }

    .form-box{
        background:#1e293b;
        padding:35px;
        border-radius:20px;
        max-width:1100px;
        width:100%;
    }

    .secao-titulo{
        margin-bottom:20px;
        margin-top:10px;
        font-size:22px;
        color:#38bdf8;
        line-height:1.3;
    }

    .secao-titulo.opcional{
        margin-top:40px;
        color:#94a3b8;
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
        width:100%;
    }

    .input-box{
        display:flex;
        flex-direction:column;
        min-width:0;
    }

    .input-box label{
        margin-bottom:10px;
        font-size:15px;
        color:#e2e8f0;
    }

    .input-box input,
    .input-box select{
        background:#0f172a;
        border:1px solid #334155;
        border-radius:14px;
        padding:16px;
        color:white;
        font-size:15px;
        width:100%;
        outline:none;
    }

    .input-box input:focus,
    .input-box select:focus{
        border-color:#38bdf8;
    }

    .acoes{
        margin-top:40px;
        display:flex;
        gap:15px;
        flex-wrap:wrap;
    }

    button{
        background:#38bdf8;
        color:#020617;
        border:none;
        padding:16px 26px;
        border-radius:14px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        opacity:0.9;
    }

    .voltar{
        background:#334155;
        color:white;
        text-decoration:none;
        padding:16px 26px;
        border-radius:14px;
        font-weight:bold;
        transition:0.3s;
        display:inline-flex;
        align-items:center;
        justify-content:center;
    }

    .voltar:hover{
        background:#475569;
    }

    @media (max-width:1000px){
        .grid{
            grid-template-columns:repeat(2,1fr);
        }
    }

    @media (max-width:900px){
        body{
            flex-direction:column;
        }

        .sidebar{
            width:100%;
            min-width:100%;
            min-height:auto;
            border-right:none;
            border-bottom:1px solid #1e293b;
            padding:20px;
        }

        .sidebar h1{
            margin-bottom:30px;
            text-align:center;
            font-size:24px;
        }

        .sidebar a{
            margin-bottom:18px;
            font-size:15px;
        }

        .content{
            padding:24px;
        }

        .form-box{
            max-width:100%;
        }
    }

    @media (max-width:600px){
        .content{
            padding:18px;
        }

        .topo p{
            margin-bottom:25px;
        }

        .form-box{
            padding:22px;
            border-radius:18px;
        }

        .grid{
            grid-template-columns:1fr;
        }

        .input-box input,
        .input-box select{
            padding:14px;
            font-size:14px;
        }

        .acoes{
            flex-direction:column;
        }

        button,
        .voltar{
            width:100%;
            text-align:center;
        }
    }

    @media (max-width:380px){
        .sidebar{
            padding:16px;
        }

        .content{
            padding:14px;
        }

        .form-box{
            padding:16px;
        }

        .sidebar h1{
            font-size:21px;
        }

        .sidebar a{
            font-size:14px;
        }

        button,
        .voltar{
            padding:14px 18px;
            font-size:14px;
        }
    }
</style>

</head>

<body>

    <div class="sidebar">

        <h1>
            Sistema Escolar
        </h1>

        <a href="/">
        🏠 Página inicial
        </a>
    
        <a href="/funcionarios/">
            👥 Funcionários
        </a>
    
    
        <a href="/funcionarios/cadastrar/">
        ➕ Novo Funcionário
        </a>

    

        <a href="/horas-extras/">
            📝 Adicionais e Faltas
        </a>

        <a href="/lancamentos-mes/">
            📅  Lancamentos Do Mês
        </a>

    </div>

    <div class="content">

        <div class="topo">

            <h1>
                Cadastrar Funcionário
            </h1>

            <p>
                Preencha os dados do trabalhador.
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-box">

                <h2 class="secao-titulo">
                    Dados Obrigatórios
                </h2>

                <div class="grid">

                    <div class="input-box">

                        <label>
                            Nome Completo *
                        </label>

                        <input
                            type="text"
                            name="nome"
                            placeholder="nome completo"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>
                            Profissão / Cargo *
                        </label>

                        <input
                            type="text"
                            name="cargo"
                            placeholder="Ex: Professor"
                            required
                        >

                    </div>

                    <div class="input-box">

    <label>
        Escola *
    </label>

    <select name="escola_existente" id="escola_existente">
    <option value="">Selecione uma escola</option>

    {% for escola in escolas %}
        <option value="{{ escola }}">
            {{ escola }}
        </option>
    {% endfor %}

    <option value="nova_escola">
        ➕ Cadastrar nova escola
    </option>

    </select>

        </div>

        <div class="input-box" id="campo_nova_escola" style="display:none;">

    <label>
        Nova escola
    </label>

    <input
        type="text"
        name="nova_escola"
        id="nova_escola"
        placeholder="Digite o nome da nova escola"
    >

    </div>

                    <div class="input-box">

                        <label>
                            Carga Horária *
                        </label>

                        <input
                            type="number"
                            name="carga_horaria"
                            placeholder="Ex: 40"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <label>
                            Situação Contratual
                        </label>

                        <input
                            type="text"
                            name="situacao_contratual"
                            placeholder="Ex: Concursado, Contratado, Temporário..."
                        >

                    </div>

                </div>

                <h2 class="secao-titulo opcional">
                    Informações Opcionais
                </h2>

                <div class="grid">

                    <div class="input-box">

                        <label>
                            CPF
                        </label>

                        <input
                            type="text"
                            name="cpf"
                            placeholder="Opcional"
                        >

                    </div>

                    <div class="input-box">

                        <label>
                            Data de Admissão
                        </label>

                        <input
                            type="date"
                            name="data_admissao"
                        >

                    </div>

                    <div class="input-box">

                        <label>
                            Contato
                        </label>

                        <input
                            type="text"
                            name="numero"
                            placeholder="Opcional"
                        >

                    </div>

                    <div class="input-box">

                        <label>
                            Localidade
                        </label>

                        <input
                            type="text"
                            name="localidade"
                            placeholder="Opcional"
                        >

                    </div>

                </div>

                <div class="acoes">

                    <button type="submit">
                        Salvar Funcionário
                    </button>

                    <a href="/" class="voltar">
                        Voltar
                    </a>

                </div>

            </div>

        </form>

    </div>

    <script>

const selectEscola = document.getElementById("escola_existente");
const campoNovaEscola = document.getElementById("campo_nova_escola");
const inputNovaEscola = document.getElementById("nova_escola");

selectEscola.addEventListener("change", function(){

    if(this.value === "nova_escola"){

        campoNovaEscola.style.display = "flex";
        inputNovaEscola.required = true;

    }else{

        campoNovaEscola.style.display = "none";
        inputNovaEscola.required = false;
        inputNovaEscola.value = "";

    }

});

</script>

</body>

</html>
