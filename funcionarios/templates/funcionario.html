<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Funcionário</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            display:flex;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:#020617;
            padding:25px;
            position:fixed;
            left:0;
            top:0;
            border-right:1px solid #1e293b;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            margin-bottom:40px;
            color:#38bdf8;
        }

        .sidebar a{
            display:block;
            text-decoration:none;
            color:#cbd5e1;
            padding:15px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
            color:white;
        }

        .content{
            margin-left:260px;
            width:100%;
            padding:30px;
        }

        .topo{
            margin-bottom:30px;
        }

        .topo h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .topo p{
            color:#94a3b8;
        }

        .form-box{
            background:#1e293b;
            border:1px solid #334155;
            border-radius:18px;
            padding:30px;
            max-width:1000px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
        }

        .campo{
            display:flex;
            flex-direction:column;
        }

        .campo label{
            margin-bottom:8px;
            color:#cbd5e1;
            font-size:14px;
        }

        .campo input{
            background:#0f172a;
            border:1px solid #334155;
            color:white;
            padding:14px;
            border-radius:12px;
            outline:none;
            font-size:15px;
        }

        .campo input:focus{
            border-color:#38bdf8;
        }

        .botoes{
            margin-top:30px;
            display:flex;
            gap:15px;
        }

        button{
            background:#38bdf8;
            color:#020617;
            border:none;
            padding:14px 25px;
            border-radius:12px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
        }

        .btn-voltar{
            background:#334155;
            color:white;
            padding:14px 25px;
            border-radius:12px;
            text-decoration:none;
            transition:0.3s;
        }

        .btn-voltar:hover{
            background:#475569;
        }

        @media(max-width:900px){
            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .content{
                margin-left:0;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">

        <div class="logo">
            Sistema Escolar
        </div>

        <a href="/">Dashboard</a>

        <a href="/funcionarios/cadastrar/">
            Cadastrar Funcionário
        </a>

        <a href="/funcionarios/">
            Funcionários
        </a>

        <a href="/horas-extras/">Horas Extras</a>

        <a href="">
            Exportar Excel
        </a>

    </div>

    <div class="content">

        <div class="topo">
            <h1>Cadastrar Funcionário</h1>
            <p>Preencha os dados básicos do funcionário.</p>
        </div>

        <div class="form-box">

            <form method="POST">

                {% csrf_token %}

                <div class="form-grid">

                    <div class="campo">
                        <label>Nome Completo</label>
                        <input type="text" name="nome" required>
                    </div>

                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" name="cpf" required>
                    </div>

                    <div class="campo">
                        <label>Profissão / Cargo</label>
                        <input type="text" name="cargo" placeholder="Ex: Professor" required>
                    </div>

                    <div class="campo">
                        <label>Carga Horária</label>
                        <input type="number" name="carga_horaria" placeholder="Ex: 40" required>
                    </div>

                    <div class="campo">
                        <label>Contato</label>
                        <input type="text" name="numero" placeholder="Opcional">
                    </div>

                    <div class="campo">
                        <label>Localidade</label>
                        <input type="text" name="localidade" placeholder="Opcional">
                    </div>

                    <div class="campo">
                        <label>Data de Admissão</label>
                        <input type="date" name="data_admissao">
                    </div>

                </div>

                <div class="botoes">

                    <button type="submit">
                        Salvar Funcionário
                    </button>

                    <a href="/" class="btn-voltar">
                        Voltar
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>
</html>
