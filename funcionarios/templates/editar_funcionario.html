<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Funcionário</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
    }

    body {
        background: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        display: flex;
        margin: 0;
        min-height: 100vh;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
    }

    input,
    select,
    textarea,
    button,
    a {
        max-width: 100%;
    }

    .sidebar {
        width: 260px;
        min-width: 260px;
        min-height: 100vh;
        background: #020617;
        padding: 25px;
        overflow-y: auto;
        flex-shrink: 0;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 40px;
        color: #38bdf8;
        line-height: 1.2;
    }

    .sidebar a {
        display: block;
        color: #cbd5e1;
        text-decoration: none;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        transition: 0.3s;
        word-break: break-word;
    }

    .sidebar a:hover {
        background: #1e293b;
    }

    .content {
        flex: 1;
        padding: 40px;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        overflow-x: hidden;
    }

    .form-box {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 18px;
        padding: 30px;
        max-width: 900px;
        width: 100%;
    }

    .campo {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
        width: 100%;
    }

    label {
        color: #cbd5e1;
        margin-bottom: 8px;
    }

    input,
    select,
    textarea {
        background: #0f172a;
        border: 1px solid #334155;
        color: white;
        padding: 14px;
        border-radius: 12px;
        outline: none;
        font-size: 15px;
        width: 100%;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    button {
        background: #38bdf8;
        color: #020617;
        border: none;
        padding: 14px 25px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        opacity: 0.9;
    }

    .btn-voltar {
        background: #334155;
        color: white;
        text-decoration: none;
        padding: 14px 25px;
        border-radius: 12px;
        margin-left: 10px;
        display: inline-block;
        transition: 0.3s;
    }

    .btn-voltar:hover {
        background: #475569;
    }

    .alerta-duplicado {
        background: #7f1d1d;
        border: 1px solid #ef4444;
        color: #fecaca;
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-weight: bold;
        line-height: 1.4;
    }

    @media (max-width: 900px) {
        body {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            min-width: 100%;
            min-height: auto;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .sidebar a {
            padding: 14px;
            font-size: 15px;
        }

        .content {
            width: 100%;
            padding: 24px;
        }

        .form-box {
            max-width: 100%;
        }
    }

    @media (max-width: 600px) {
        .content {
            padding: 18px;
        }

        .form-box {
            padding: 20px;
            border-radius: 16px;
        }

        input,
        select,
        textarea {
            padding: 13px;
            font-size: 14px;
        }

        button,
        .btn-voltar {
            width: 100%;
            margin-left: 0;
            margin-top: 10px;
            text-align: center;
            display: block;
        }

        .alerta-duplicado {
            font-size: 14px;
            padding: 14px;
        }
    }

    @media (max-width: 380px) {
        .sidebar {
            padding: 16px;
        }

        .content {
            padding: 14px;
        }

        .form-box {
            padding: 16px;
        }

        .sidebar a {
            font-size: 14px;
            padding: 13px;
        }

        .logo {
            font-size: 20px;
        }
    }
</style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            Sistema Escolar
        </div>

        <a href="/">
            🏠 PAGINA INICIAL
        </a>

        <a href="/funcionarios/">
            👥 FUNCIONARIOS
        </a>

        <a href="/funcionarios/cadastrar/">
            ➕ NOVO FUNCIONARIO 
        </a>

        <hr>

        <a href="/horas-extras/">
            📑 REGISTRAR FREQUENCIA
        </a>

        <hr>

        <a href="/lancamentos-mes/">
            📅 LANÇAMENTO MENSAL
        </a>
    </div>

    <div class="content">

        <h1>Editar Funcionário</h1>

        <div class="form-box">

            {% if erro_nome_duplicado %}
            <div class="alerta-duplicado">
                ⚠ Já existe outro funcionário cadastrado com este nome:
                <strong>{{ nome_duplicado }}</strong>
            </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <input
                    type="hidden"
                    name="next"
                    value="{{ next_url }}"
                >

                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" value="{{ funcionario.nome }}" required>
                </div>

                <div class="campo">
                    <label>CPF</label>
                    <input type="text" name="cpf" value="{{ funcionario.cpf }}">
                </div>

                <div class="campo">
                    <label>Situação Contratual</label>
                    <input type="text" name="situacao_contratual" value="{{ funcionario.situacao_contratual }}">
                </div>

                <div class="campo">
                <label>Escola</label>

                <select name="escola_existente" id="escola_existente">
                    <option value="">Selecione uma escola</option>

                    {% for escola in escolas %}
                        <option
                            value="{{ escola }}"
                            {% if funcionario.escola == escola %}selected{% endif %}
                        >
                            {{ escola }}
                        </option>
                    {% endfor %}

                    <option value="nova_escola">
                        ➕ Cadastrar nova escola
                    </option>
                </select>
            </div>

<div class="campo" id="campo_nova_escola" style="display:none;">
    <label>Nova escola</label>

    <input
        type="text"
        name="nova_escola"
        id="nova_escola"
        placeholder="Digite o nome da nova escola"
    >
</div>

                <div class="campo">
                    <label>Profissão / Cargo</label>
                    <input type="text" name="cargo" value="{% if funcionario.cargo %}{{ funcionario.cargo.nome }}{% endif %}">
                </div>

                <div class="campo">
                    <label>Carga Horária</label>
                    <input type="number" name="carga_horaria" value="{{ funcionario.carga_horaria }}">
                </div>

                <div class="campo">
                    <label>Contato</label>
                    <input type="text" name="numero" value="{{ funcionario.numero }}">
                </div>

                <div class="campo">
                    <label>Localidade</label>
                    <input type="text" name="localidade" value="{{ funcionario.localidade }}">
                </div>

                <div class="campo">
                    <label>Data de Admissão</label>
                    <input type="date" name="data_admissao" value="{{ funcionario.data_admissao|date:'Y-m-d' }}">
                </div>

                <button type="submit">
                    Salvar Alterações
                </button>

                <a
                    href="{% if next_url %}{{ next_url }}{% else %}{% url 'funcionarios' %}{% endif %}"
                    class="btn-voltar"
                >
                    Voltar
                </a>

            </form>

        </div>

    </div>

    <script>
    const selectEscola = document.getElementById("escola_existente");
    const campoNovaEscola = document.getElementById("campo_nova_escola");
    const inputNovaEscola = document.getElementById("nova_escola");

    selectEscola.addEventListener("change", function(){
        if(this.value === "nova_escola"){
            campoNovaEscola.style.display = "flex";
            inputNovaEscola.required = true;
        }else{
            campoNovaEscola.style.display = "none";
            inputNovaEscola.required = false;
            inputNovaEscola.value = "";
        }
    });
</script>

</body>
</html>
