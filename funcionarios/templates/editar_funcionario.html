<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Funcionário</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            display:flex;
            margin:0;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:#020617;
            padding:25px;
            position:fixed;
            left:0;
            top:0;
            overflow-y:auto;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            margin-bottom:40px;
            color:#38bdf8;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            text-decoration:none;
            padding:15px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
        }

        .content{
            margin-left:320px;
            padding:40px;
            width:calc(100% - 320px);
        }

        .form-box{
            background:#1e293b;
            border:1px solid #334155;
            border-radius:18px;
            padding:30px;
            max-width:900px;
            width:100%;
        }

        .campo{
            display:flex;
            flex-direction:column;
            margin-bottom:18px;
        }

        label{
            color:#cbd5e1;
            margin-bottom:8px;
        }

        input{
            background:#0f172a;
            border:1px solid #334155;
            color:white;
            padding:14px;
            border-radius:12px;
            outline:none;
            font-size:15px;
            width:100%;
        }

        button{
            background:#38bdf8;
            color:#020617;
            border:none;
            padding:14px 25px;
            border-radius:12px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            opacity:0.9;
        }

        .btn-voltar{
            background:#334155;
            color:white;
            text-decoration:none;
            padding:14px 25px;
            border-radius:12px;
            margin-left:10px;
            display:inline-block;
            transition:0.3s;
        }

        .btn-voltar:hover{
            background:#475569;
        }

        .alerta-duplicado{
            background:#7f1d1d;
            border:1px solid #ef4444;
            color:#fecaca;
            padding:16px;
            border-radius:12px;
            margin-bottom:20px;
            font-weight:bold;
        }

        @media (max-width:768px){
            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
                padding:20px;
            }

            .logo{
                text-align:center;
                margin-bottom:25px;
                font-size:22px;
            }

            .sidebar a{
                padding:14px;
                font-size:15px;
            }

            .content{
                margin-left:0;
                width:100%;
                padding:20px;
            }

            .form-box{
                padding:20px;
                border-radius:16px;
            }

            input{
                padding:13px;
                font-size:14px;
            }

            select{
                background:#0f172a;
                border:1px solid #334155;
                color:white;
                padding:14px;
                border-radius:12px;
                outline:none;
                font-size:15px;
                width:100%;
            }

            button,
            .btn-voltar{
                width:100%;
                margin:0;
                margin-top:10px;
                text-align:center;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            Sistema Escolar
        </div>

        <a href="/">Dashboard</a>
        <a href="/funcionarios/">Funcionários</a>
        <a href="/horas-extras/">Horas Extras</a>
    </div>

    <div class="content">

        <h1>Editar Funcionário</h1>

        <div class="form-box">

            {% if erro_nome_duplicado %}
            <div class="alerta-duplicado">
                ⚠ Já existe outro funcionário cadastrado com este nome:
                <strong>{{ nome_duplicado }}</strong>
            </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" value="{{ funcionario.nome }}" required>
                </div>

                <div class="campo">
                    <label>CPF</label>
                    <input type="text" name="cpf" value="{{ funcionario.cpf }}">
                </div>

                <div class="campo">
                    <label>Situação Contratual</label>
                    <input type="text" name="situacao_contratual" value="{{ funcionario.situacao_contratual }}">
                </div>

                <div class="campo">
                <label>Escola</label>

                <select name="escola_existente" id="escola_existente">
                    <option value="">Selecione uma escola</option>

                    {% for escola in escolas %}
                        <option
                            value="{{ escola }}"
                            {% if funcionario.escola == escola %}selected{% endif %}
                        >
                            {{ escola }}
                        </option>
                    {% endfor %}

                    <option value="nova_escola">
                        ➕ Cadastrar nova escola
                    </option>
                </select>
            </div>

<div class="campo" id="campo_nova_escola" style="display:none;">
    <label>Nova escola</label>

    <input
        type="text"
        name="nova_escola"
        id="nova_escola"
        placeholder="Digite o nome da nova escola"
    >
</div>

                <div class="campo">
                    <label>Profissão / Cargo</label>
                    <input type="text" name="cargo" value="{% if funcionario.cargo %}{{ funcionario.cargo.nome }}{% endif %}">
                </div>

                <div class="campo">
                    <label>Carga Horária</label>
                    <input type="number" name="carga_horaria" value="{{ funcionario.carga_horaria }}">
                </div>

                <div class="campo">
                    <label>Contato</label>
                    <input type="text" name="numero" value="{{ funcionario.numero }}">
                </div>

                <div class="campo">
                    <label>Localidade</label>
                    <input type="text" name="localidade" value="{{ funcionario.localidade }}">
                </div>

                <div class="campo">
                    <label>Data de Admissão</label>
                    <input type="date" name="data_admissao" value="{{ funcionario.data_admissao|date:'Y-m-d' }}">
                </div>

                <button type="submit">
                    Salvar Alterações
                </button>

                <a href="/funcionarios/" class="btn-voltar">
                    Voltar
                </a>

            </form>

        </div>

    </div>

    <script>
    const selectEscola = document.getElementById("escola_existente");
    const campoNovaEscola = document.getElementById("campo_nova_escola");
    const inputNovaEscola = document.getElementById("nova_escola");

    selectEscola.addEventListener("change", function(){
        if(this.value === "nova_escola"){
            campoNovaEscola.style.display = "flex";
            inputNovaEscola.required = true;
        }else{
            campoNovaEscola.style.display = "none";
            inputNovaEscola.required = false;
            inputNovaEscola.value = "";
        }
    });
</script>

</body>
</html>
