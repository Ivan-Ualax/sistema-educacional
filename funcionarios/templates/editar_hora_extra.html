<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>
        Editar Hora Extra
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#020617;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .container{
            max-width:1400px;
            margin:auto;
        }

        .grid-edicao{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:24px;
        }

        .card-edicao{
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:24px;
            padding:30px;
            box-shadow:0 0 30px rgba(0,0,0,0.25);
        }

        h1{
            color:#38bdf8;
            font-size:38px;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-top:18px;
            margin-bottom:8px;
            color:#cbd5e1;
            font-size:15px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:1px solid #334155;
            background:#020617;
            color:white;
            outline:none;
            font-size:15px;
            transition:0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#38bdf8;
            box-shadow:0 0 10px rgba(56,189,248,0.15);
        }

        textarea{
            min-height:140px;
            resize:vertical;
        }

        .acoes{
            display:flex;
            gap:14px;
            margin-top:35px;
            flex-wrap:wrap;
        }

        button,
        .btn-voltar,
        .btn-excluir{
            padding:14px 22px;
            border-radius:14px;
            text-decoration:none;
            font-weight:bold;
            font-size:14px;
            border:none;
            cursor:pointer;
            transition:0.3s;
        }

        button{
            background:#22c55e;
            color:white;
        }

        button:hover{
            background:#16a34a;
        }

        .btn-voltar{
            background:#334155;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .btn-voltar:hover{
            background:#475569;
        }

        .btn-excluir{
            background:#991b1b;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .btn-excluir:hover{
            background:#7f1d1d;
        }

        .linha-dupla{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:14px;
        }

        /* MODAL */

        .modal-fundo{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(2,6,23,0.85);
            align-items:center;
            justify-content:center;
            z-index:9999;
        }

        .modal-box{
            width:420px;
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:18px;
            padding:28px;
        }

        .modal-box h2{
            color:white;
            margin-bottom:14px;
        }

        .modal-box p{
            color:#cbd5e1;
            margin-bottom:24px;
            line-height:1.5;
        }

        .modal-acoes{
            display:flex;
            justify-content:flex-end;
            gap:12px;
        }

        .btn-cancelar{
            background:#334155;
            color:white;
            border:none;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn-confirmar{
            background:#dc2626;
            color:white;
            text-decoration:none;
            padding:12px 18px;
            border-radius:10px;
            font-weight:bold;
        }

        @media(max-width:900px){

            body{
                padding:20px;
            }

            .grid-edicao{
                grid-template-columns:1fr;
            }

            h1{
                font-size:30px;
            }

            .linha-dupla{
                grid-template-columns:1fr;
            }

            .acoes{
                flex-direction:column;
            }

            button,
            .btn-voltar,
            .btn-excluir{
                width:100%;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <form method="POST">

        {% csrf_token %}

        <div class="grid-edicao">

            <!-- HORA EXTRA -->

            <div class="card-edicao">

                <h1>
                    Editar Hora Extra
                </h1>

                <label>
                    Tipo
                </label>

                <select name="tipo">

                    <option value="normal" {% if lancamento.tipo == 'normal' %}selected{% endif %}>
                        Hora Extra Normal
                    </option>

                    <option value="f1" {% if lancamento.tipo == 'f1' %}selected{% endif %}>
                        Hora Extra F1
                    </option>

                    <option value="f2" {% if lancamento.tipo == 'f2' %}selected{% endif %}>
                        Hora Extra F2
                    </option>

                </select>

                <label>
                    Quantidade de Horas
                </label>

                <input
                    type="text"
                    name="quantidade_horas"
                    value="{{ lancamento.quantidade_horas|floatformat:0 }}"
                >

                <label>
                    Valor
                </label>

                <input
                    type="text"
                    name="valor"
                    value="{{ lancamento.valor }}"
                >

                <div class="linha-dupla">

                    <div>

                        <label>
                            Mês
                        </label>

                        <select name="mes_referencia">

                            <option value="1" {% if lancamento.mes_referencia == 1 %}selected{% endif %}>Janeiro</option>
                            <option value="2" {% if lancamento.mes_referencia == 2 %}selected{% endif %}>Fevereiro</option>
                            <option value="3" {% if lancamento.mes_referencia == 3 %}selected{% endif %}>Março</option>
                            <option value="4" {% if lancamento.mes_referencia == 4 %}selected{% endif %}>Abril</option>
                            <option value="5" {% if lancamento.mes_referencia == 5 %}selected{% endif %}>Maio</option>
                            <option value="6" {% if lancamento.mes_referencia == 6 %}selected{% endif %}>Junho</option>
                            <option value="7" {% if lancamento.mes_referencia == 7 %}selected{% endif %}>Julho</option>
                            <option value="8" {% if lancamento.mes_referencia == 8 %}selected{% endif %}>Agosto</option>
                            <option value="9" {% if lancamento.mes_referencia == 9 %}selected{% endif %}>Setembro</option>
                            <option value="10" {% if lancamento.mes_referencia == 10 %}selected{% endif %}>Outubro</option>
                            <option value="11" {% if lancamento.mes_referencia == 11 %}selected{% endif %}>Novembro</option>
                            <option value="12" {% if lancamento.mes_referencia == 12 %}selected{% endif %}>Dezembro</option>

                        </select>

                    </div>

                    <div>

                        <label>
                            Ano
                        </label>

                        <input
                            type="number"
                            name="ano"
                            value="{{ lancamento.ano }}"
                        >

                    </div>

                </div>

                <label>
                    Observação Hora Extra
                </label>

                <textarea name="observacao_hora_extra">{{ lancamento.observacao_hora_extra|default_if_none:"" }}</textarea>

            </div>

            <!-- FALTA -->

            <div class="card-edicao">

                <h1>
                    Editar Falta
                </h1>

                <div class="linha-dupla">

                    <div>

                        <label>
                            Número de Faltas
                        </label>

                        <input
                            type="number"
                            name="numero_faltas"
                            value="{{ lancamento.numero_faltas }}"
                        >

                    </div>

                    <div>

                        <label>
                            Data da Falta
                        </label>

                        <input
                            type="text"
                            name="data_falta"
                            placeholder="DD/MM"
                            maxlength="5"
                            autocomplete="off"
                            value="{% if lancamento.data_falta %}{{ lancamento.data_falta|date:'d/m' }}{% endif %}"
                        >

                    </div>

                </div>

                <label>
                    Cor da Observação da Falta
                </label>

                <select name="cor_texto">

                    <option value="normal" {% if lancamento.cor_texto == 'normal' %}selected{% endif %}>
                        Normal
                    </option>

                    <option value="vermelho" {% if lancamento.cor_texto == 'vermelho' %}selected{% endif %}>
                        Vermelho
                    </option>

                    <option value="verde" {% if lancamento.cor_texto == 'verde' %}selected{% endif %}>
                        Verde
                    </option>

                </select>

                <label>
                    Observação Falta
                </label>

                <textarea name="observacao_falta">{{ lancamento.observacao_falta|default_if_none:"" }}</textarea>

            </div>

        </div>

        <div class="acoes">

            <button type="submit">
                Salvar Alterações
            </button>

            <button
                type="button"
                class="btn-excluir"
                onclick="document.getElementById('modalExcluir').style.display='flex'"
            >
                Excluir
            </button>

            <a
                href="{% url 'lancamentos_mes' %}"
                class="btn-voltar"
            >
                Voltar
            </a>

        </div>

    </form>

</div>

<!-- MODAL -->

<div id="modalExcluir" class="modal-fundo">

    <div class="modal-box">

        <h2>
            Confirmar exclusão
        </h2>

        <p>
            Deseja realmente excluir este lançamento?
        </p>

        <div class="modal-acoes">

            <button
                type="button"
                class="btn-cancelar"
                onclick="fecharModalExcluir()"
            >
                Cancelar
            </button>

            <a
                id="btnConfirmarExcluir"
                href="#"
                class="btn-confirmar"
            >
                Excluir
            </a>

        </div>

    </div>

</div>

<script>

    function abrirModalExcluir(id){

        document.getElementById(
            'btnConfirmarExcluir'
        ).href = '/horas-extras/excluir/' + id + '/';

        document.getElementById(
            'modalExcluir'
        ).style.display = 'flex';
    }

    function fecharModalExcluir(){

        document.getElementById(
            'modalExcluir'
        ).style.display = 'none';
    }

    const campoData = document.querySelector(
        'input[name="data_falta"]'
    );

    campoData.addEventListener('input', function(){

        let valor = this.value.replace(/\D/g, '');

        if(valor.length >= 2){

            valor = valor.substring(0,2) + '/' + valor.substring(2,4);

        }

        this.value = valor.substring(0,5);

    });

</script>

</body>

</html>
