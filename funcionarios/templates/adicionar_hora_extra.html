<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Horas extras e faltas do mês.</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #0f172a;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            display: flex;
            margin: 0;
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        img,
        input,
        select,
        textarea,
        button,
        a {
            max-width: 100%;
        }

        .sidebar {
            width: 260px;
            min-width: 260px;
            min-height: 100vh;
            background: #020617;
            padding: 25px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #38bdf8;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            word-break: break-word;
        }

        .sidebar a:hover {
            background: #1e293b;
        }

        .content {
            flex: 1;
            padding: 40px;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
        }

        .topo {
            margin-bottom: 25px;
        }

        .topo h1 {
            margin-bottom: 10px;
            font-size: clamp(26px, 4vw, 32px);
            line-height: 1.2;
        }

        .topo p {
            color: #94a3b8;
            line-height: 1.5;
        }

        .form-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 18px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        .campo {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
            width: 100%;
        }

        label {
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            width: 100%;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .btn-voltar {
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 12px;
            margin-left: 10px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-voltar:hover {
            background: #475569;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: 100%;
                min-height: auto;
                padding: 20px;
            }

            .logo {
                text-align: center;
                margin-bottom: 25px;
            }

            .sidebar a {
                padding: 14px;
                font-size: 15px;
            }

            .content {
                width: 100%;
                padding: 24px;
            }

            .form-box {
                max-width: 100%;
            }
        }

        @media (max-width: 600px) {
            .content {
                padding: 18px;
            }

            .topo h1 {
                font-size: 26px;
            }

            .topo p {
                font-size: 14px;
            }

            .form-box {
                padding: 20px;
                border-radius: 16px;
            }

            input,
            select,
            textarea {
                font-size: 14px;
                padding: 13px;
            }

            button,
            .btn-voltar {
                width: 100%;
                margin-left: 0;
                margin-top: 10px;
                text-align: center;
                display: block;
            }
        }

        @media (max-width: 380px) {
            .sidebar {
                padding: 16px;
            }

            .content {
                padding: 14px;
            }

            .form-box {
                padding: 16px;
            }

            .sidebar a {
                font-size: 14px;
                padding: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <div class="logo">
            Sistema Escolar
        </div>

        <a href="/">
        🏠 Página inicial
        </a>
    
        <a href="/funcionarios/">
            👥 Funcionários
        </a>
    
    
        <a href="/funcionarios/cadastrar/">
        ➕ Novo Funcionário
        </a>

    

        <a href="/horas-extras/">
            📝 Adicionais e Faltas
        </a>

        <a href="/lancamentos-mes/">
            📅  Lancamentos Do Mês
        </a>

    </div>

    <div class="content">

        <div class="topo">

            <h1>
                Horas extras e faltas do mês.
            </h1>

            <p>
                Funcionário:
                <strong>{{ funcionario.nome }}</strong>
            </p>

        </div>

        <div class="form-box">

            <form method="POST">

                {% csrf_token %}

                <div class="campo">

                    <label>
                        Tipo de Hora Extra
                    </label>

                    <select name="tipo" required>

                        <option value="normal">
                            Hora Extra
                        </option>

                        <option value="f1">
                            Hora Aula F1
                        </option>

                        <option value="f2">
                            Hora Aula F2
                        </option>

                    </select>

                </div>

                <div class="campo">

                    <label>
                        Quantidade de Horas
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="quantidade_horas"
                        value="0"
                    >

                </div>

                {% if pode_ver_valores %}

                <div class="campo">

                    <label>
                        Valor
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="valor"
                        value="0"
                    >

                </div>

                {% endif %}

                <div class="campo">

                    <label>
                        Mês de Referência
                    </label>

                    <select name="mes_referencia">

                        <option value="1" {% if mes_atual == 1 %}selected{% endif %}>
                            Janeiro
                        </option>

                        <option value="2" {% if mes_atual == 2 %}selected{% endif %}>
                            Fevereiro
                        </option>

                        <option value="3" {% if mes_atual == 3 %}selected{% endif %}>
                            Março
                        </option>

                        <option value="4" {% if mes_atual == 4 %}selected{% endif %}>
                            Abril
                        </option>

                        <option value="5" {% if mes_atual == 5 %}selected{% endif %}>
                            Maio
                        </option>

                        <option value="6" {% if mes_atual == 6 %}selected{% endif %}>
                            Junho
                        </option>

                        <option value="7" {% if mes_atual == 7 %}selected{% endif %}>
                            Julho
                        </option>

                        <option value="8" {% if mes_atual == 8 %}selected{% endif %}>
                            Agosto
                        </option>

                        <option value="9" {% if mes_atual == 9 %}selected{% endif %}>
                            Setembro
                        </option>

                        <option value="10" {% if mes_atual == 10 %}selected{% endif %}>
                            Outubro
                        </option>

                        <option value="11" {% if mes_atual == 11 %}selected{% endif %}>
                            Novembro
                        </option>

                        <option value="12" {% if mes_atual == 12 %}selected{% endif %}>
                            Dezembro
                        </option>

                    </select>

                </div>

                <div class="campo">

                    <label>
                        Ano
                    </label>

                    <input
                        type="number"
                        name="ano"
                        value="{{ ano_atual }}"
                    >

                </div>

                <div class="campo">

                    <label>
                        Observação
                    </label>

                    <textarea
                        name="observacao"
                        placeholder="Opcional"
                    ></textarea>

                </div>

                <div class="campo">

                    <label>
                        Número de Faltas
                    </label>

                    <input
                        type="number"
                        name="numero_faltas"
                        value="0"
                        min="0"
                    >

                </div>

                <div class="campo">

                    <label>
                        Data da Falta
                    </label>

                    <input
                        type="text"
                        name="data_falta"
                        placeholder="Ex: 08/06"
                    >

                </div>

                <div class="campo">

                    <label>
                        Observação da Falta
                    </label>

                    <textarea
                        name="observacao_falta"
                        placeholder="Opcional"
                    ></textarea>

                </div>

                <div class="campo">

                    <label>
                        Cor do Destaque
                    </label>

                    <select name="cor_texto">

                        <option value="normal">
                            Normal
                        </option>

                        <option value="vermelho">
                            Vermelho
                        </option>

                        <option value="verde">
                            Verde
                        </option>

                    </select>

                </div>

                <button type="submit">
                    Salvar Lançamento
                </button>

                <a href="/horas-extras/" class="btn-voltar">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</body>

</html>
