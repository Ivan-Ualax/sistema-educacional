{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Sistema Escolar</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#020617;
            font-family:'Segoe UI', sans-serif;
            color:white;
        }

        .login-box{
            width:400px;
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:20px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,0.4);
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo img{
            width:120px;
            height:120px;
            border-radius:50%;
            margin-bottom:15px;
        }

        .logo h1{
            font-size:30px;
            font-weight:800;
        }

        .logo span{
            color:#38bdf8;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#94a3b8;
            font-size:14px;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#020617;
            border:1px solid #1e293b;
            color:white;
            font-size:15px;
        }

        .input-group input:focus{
            border:1px solid #38bdf8;
        }

        .btn-login{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            transform:translateY(-2px);
        }

        .erro{
            background:#7f1d1d;
            color:#fecaca;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            font-size:14px;
            text-align:center;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <div class="logo">

            <img src="{% static 'img/mulungu.png' %}" alt="Logo">

            <h1>
                Sistema <span>Educacional</span>
            </h1>

        </div>

        {% if form.errors %}

            <div class="erro">
                Usuário ou senha inválidos.
            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">

                <label>
                    Usuário
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Digite seu usuário"
                    required
                >

            </div>

            <div class="input-group">

                <label>
                    Senha
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <button type="submit" class="btn-login">
                Entrar no Sistema
            </button>

        </form>

    </div>

</body>

</html>
