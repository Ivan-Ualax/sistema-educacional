<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    {% load static %}

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#020617;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{
            width:420px;
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:24px;
            padding:40px;
            text-align:center;
            box-shadow:0 0 40px rgba(0,0,0,0.4);
        }

        .logo{
            width:120px;
            margin-bottom:25px;
        }

        h1{
            margin-bottom:10px;
            font-size:30px;
        }

        p{
            color:#94a3b8;
            margin-bottom:30px;
        }

        .campo{
            margin-bottom:20px;
            text-align:left;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#cbd5e1;
        }

        input{
            width:100%;
            background:#020617;
            border:1px solid #334155;
            padding:15px;
            border-radius:14px;
            color:white;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#38bdf8;
        }

        button{
            width:100%;
            background:#38bdf8;
            border:none;
            padding:15px;
            border-radius:14px;
            color:#020617;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
        }

        .erro{
            background:#7f1d1d;
            color:#fecaca;
            padding:12px;
            border-radius:12px;
            margin-bottom:20px;
        }

    </style>

</head>
<body>

    <div class="login-box">

        <!-- LOGO -->

        <img
            src="{% static 'logo.png' %}"
            class="logo"
        >

        <h1>
            Sistema Escolar
        </h1>

        <p>
            Faça login para acessar o sistema
        </p>

        {% if form.errors %}

            <div class="erro">
                Usuário ou senha inválidos
            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="campo">

                <label>
                    Usuário
                </label>

                <input
                    type="text"
                    name="username"
                    required
                >

            </div>

            <div class="campo">

                <label>
                    Senha
                </label>

                <input
                    type="password"
                    name="password"
                    required
                >

            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</body>
</html>
